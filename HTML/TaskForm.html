<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/TaskForm.css">
</head>
<body>
    <div class="school">
        <form action="/submit" method="post">
            <h1>School Championship Registration Form</h1>
            <label for="name" class="label">School name:</label><br>
            <input type="text" id="name" name="name" required placeholder="Name" class="full"><br><br>

            <label for="name" class="label">Student name:</label><br>
            <input type="name" id="name" name="name" required placeholder="First" class="half">
            <input type="name" id="name" name="name" required placeholder="Last" class="half"> <br><br>
            <label for="name" class="label">Parent name:</label><br>
            <input type="name" id="name" name="name" required placeholder="First" class="half">
            <input type="name" id="name" name="name" required placeholder="Last" class="half"> <br><br>
            <label for="phone" class="label">Parent Phone:</label><br>
            <input type="tel" id="phone" name="phone" required placeholder="1234567890"class="full"><br><br>
            <label for="email" class="label">Parent email:</label><br>
            <input type="email" id="email" name="email" required placeholder="example@emai.com" class="full"><br><br>
            <label for="text" class="label">Preferred sports</label><br>
            <input type="text" id="text" name="text" required placeholder="Sports" class="full"> <br><br>
            <input type="submit" value="Submit" class="button">
    </div>
</body>
</html>
